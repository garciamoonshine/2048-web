<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔢 2048</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:#1a1a2e; color:#fff; font-family:'Segoe UI',sans-serif; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
    #top-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
    .score-box { background:rgba(255,255,255,0.1); padding:6px 16px; border-radius:12px; text-align:center; }
    .score-box .val { font-size:20px; font-weight:bold; color:#ffd700; }
    .score-box .lbl { font-size:11px; color:#aaa; }
    #grid-select { background:#16213e; color:#fff; border:1px solid #555; border-radius:12px; padding:5px 10px; font-size:13px; }
    #game-board { display:grid; gap:8px; background:#0f0f23; padding:10px; border-radius:12px; touch-action:none; }
    .tile { border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; transition:all 0.1s; }
    #controls { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
    .btn { padding:8px 20px; border-radius:20px; border:none; cursor:pointer; font-size:14px; font-weight:bold; }
    #undoBtn { background:#533483; color:#fff; }
    #hintBtn { background:#ffd700; color:#333; }
    #newBtn  { background:#4ecca3; color:#000; }
    #hint-display { text-align:center; font-size:15px; font-weight:bold; color:#ffd700; min-height:22px; margin-top:8px; }
    #move-counter { text-align:center; font-size:13px; color:#aaa; margin-top:4px; }
  </style>
</head>
<body>
  <h2>🔢 2048</h2>
  <div id="top-bar">
    <div class="score-box"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="score-box"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
    <select id="grid-select">
      <option value="4" selected>4×4 Classic</option>
      <option value="5">5×5 Hard</option>
      <option value="6">6×6 Expert</option>
    </select>
  </div>
  <div id="game-board"></div>
  <div id="hint-display"></div>
  <div id="move-counter">Moves: 0</div>
  <div id="controls">
    <button class="btn" id="undoBtn">↩ Undo</button>
    <button class="btn" id="hintBtn">💡 Hint</button>
    <button class="btn" id="newBtn">🔄 New Game</button>
  </div>
  <script src="hint.js"></script>
  <script src="game.js"></script>
</body>
</html>
